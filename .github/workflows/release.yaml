name: "Release job"

on:
  push:
    tags: [ "v*.*.*" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  nix-release-linux:
    runs-on: ubuntu-latest
    steps:
    - name: Disable app armor. Causes problems with bwrap and Nix.
      run: |
        sudo aa-teardown || true
        sudo systemctl disable --now apparmor.service || true
        sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
    - uses: cachix/install-nix-action@630ae543ea3a38a9a4166f03376c02c50f408342 # v31
      with:
        github_access_token: ${{ secrets.GITHUB_TOKEN }}
        nix_path: nixpkgs=channel:nixos-unstable
    - run: nix build .#leap-linux
    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: leap-linux.img
        path: ./result/images/sdcard.img

  release:
    runs-on: ubuntu-latest
    needs: nix-release-linux
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
    - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
      with:
        name: leap-linux.img
        path: artifacts/
    - uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1.21.0
      with:
        artifacts: artifacts/*
